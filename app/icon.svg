<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="orb" cx="42%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="45%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#3b0764"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>

  <!-- Outer glow -->
  <circle cx="16" cy="16" r="15" fill="url(#glow)" filter="url(#blur)"/>

  <!-- Main orb -->
  <circle cx="16" cy="16" r="13" fill="url(#orb)"/>

  <!-- Highlight -->
  <ellipse cx="12.5" cy="11" rx="4" ry="2.5" fill="white" opacity="0.25"/>

  <!-- Sound wave bars (centered) -->
  <rect x="9"  y="13.5" width="2" height="5"   rx="1" fill="white" opacity="0.9"/>
  <rect x="12.5" y="11" width="2" height="10"  rx="1" fill="white" opacity="0.9"/>
  <rect x="16" y="12.5" width="2" height="7"   rx="1" fill="white" opacity="0.9"/>
  <rect x="19.5" y="10" width="2" height="12"  rx="1" fill="white" opacity="0.9"/>
</svg>
